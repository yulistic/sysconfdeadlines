# =============================================================================
# Seed data for systems-conference deadlines.
#
# This file is the human-editable source of truth. To add or fix a deadline,
# edit it here and re-run scripts/update_deadlines.py (or let the GitHub Action
# do it). Times are LOCAL wall-clock for the given `timezone`; the build script
# converts them to absolute UTC for the website.
#
# timezone:  AoE (UTC-12, no DST) | UTC-12..UTC+14 | EST | EDT | PST | PDT | PT
# datetime:  "YYYY-MM-DD HH:MM:SS"  (or "TBD" if not announced yet)
#
# For venues with a `ccfddl:` path, the updater will refresh their editions from
# the community-maintained ccfddl dataset when it can reach it, and fall back to
# the editions below otherwise. HotOS / HotStorage are maintained here only.
# =============================================================================

