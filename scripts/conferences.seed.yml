# =============================================================================
# Venue registry for the systems-conference deadlines site.
#
# The updater (scripts/update_deadlines.py) reads each venue's `url_template`,
# fills in the year (which is the only part of these URLs that changes between
# editions), fetches the official Call for Papers, and scrapes the submission
# deadlines straight from the page. ccfddl is NOT used.
#
# `fallback` is the curated safety net: if scraping a venue fails or returns
# nothing plausible, that venue keeps the fallback below, so the site is never
# overwritten with bad data. Edit a fallback if you ever need to pin a value.
#
# url_template placeholders:  {yy} = 2-digit year (e.g. 27),  {yyyy} = 4-digit.
# timezone (deadline tz):     AoE | UTC-12..UTC+14 | EST | EDT | PST | PDT | PT
# =============================================================================

venues:

  OSDI:
    full_name: USENIX Symposium on Operating Systems Design and Implementation
    tags: [OS]
    url_template: "https://www.usenix.org/conference/osdi{yy}/call-for-papers"
    hotcrp: ["https://osdi{yy}.usenix.hotcrp.com/deadlines"]
    timezone: AoE
    fallback:
      year: 2026
      edition: "'26"
      place: "Seattle, WA, USA"
      date: "July 13-15, 2026"
      link: "https://www.usenix.org/conference/osdi26/call-for-papers"
      timezone: EST
      deadlines:
        - { label: Abstract, datetime: "2025-12-04 17:59:00" }
        - { label: Paper,    datetime: "2025-12-11 17:59:00" }

  SOSP:
    full_name: ACM Symposium on Operating Systems Principles
    tags: [OS]
    url_template: "https://sigops.org/s/conferences/sosp/{yyyy}/cfp.html"
    hotcrp: ["https://sosp{yy}.hotcrp.com/deadlines"]
    timezone: AoE
    fallback:
      year: 2026
      edition: "2026"
      place: "Prague, Czechia"
      date: "Sept 29 - Oct 2, 2026"
      link: "https://sigops.org/s/conferences/sosp/2026/cfp.html"
      timezone: AoE
      deadlines:
        - { label: Abstract, datetime: "2026-03-26 23:59:59" }
        - { label: Paper,    datetime: "2026-04-01 23:59:59" }

  ASPLOS:
