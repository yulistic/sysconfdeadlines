    hotcrp: ["https://asplos{yy}spring.hotcrp.com/deadlines", "https://asplos{yy}fall.hotcrp.com/deadlines"]
    timezone: AoE
    fallback:
      year: 2027
      edition: "'27"
      place: "Heraklion, Crete, Greece"
      date: "April 11-15, 2027"
      link: "https://www.asplos-conference.org/asplos2027/cfp/"
      timezone: AoE
